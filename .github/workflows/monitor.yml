name: Utah Rules MD5 Monitor

on:
  schedule:
    - cron: '0 13 * * *' # Runs daily at 1:00 PM UTC
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install requests lxml

      - name: Check Hash
        id: check
        run: python monitor_hashes.py

      - name: Commit and Push Updated Hash
        if: steps.check.outputs.changed == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update Utah Index MD5 Hash"
          file_pattern: "last_hash.txt"

      - name: Send Change Alert Email
        if: steps.check.outputs.changed == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "🚨 ACTION REQUIRED: Utah Index Updated"
          html_body: "<p>The MD5 hash for the Utah Index of Changes has changed.</p><p><strong><a href='${{ steps.check.outputs.file_url }}'>Click here to download the latest Excel file</a>.</strong></p>"
          to: REDACTED
          from: Utah Rules Monitor

      - name: Send Weekly Heartbeat Email
        # Trigger if it's Monday (day 1) AND no change was detected (to avoid double emails)
        if: steps.check.outputs.day == '3' && steps.check.outputs.changed != 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "✅ Weekly Heartbeat: Utah Monitor Active"
          body: "This is your weekly confirmation that the Utah Rules Monitor is online. No changes were detected this week."
          to: REDACTED
          from: Utah Rules Monitor
