name: Utah Rules MD5 Monitor

on:
  schedule:
    - cron: '0 13 * * *' # Runs daily at 1:00 PM UTC
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install requests lxml

      - name: Check Hash
        id: check
        run: |
          OUTPUT=$(python monitor_hashes.py)
          echo "$OUTPUT"
          if [[ $OUTPUT == *"CHANGE_DETECTED=true"* ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          fi
          # Add current day of the week (1=Monday, 7=Sunday)
          echo "day=$(date +%u)" >> $GITHUB_OUTPUT

      - name: Commit Updated Hash
        if: steps.check.outputs.changed == 'true'
        run: |
          git config --global user.name "Hash-Bot"
          git config --global user.email "bot@github.com"
          git add last_hash.txt
          git commit -m "Update Utah Index MD5 Hash"
          git push

      - name: Send Change Alert Email
        if: steps.check.outputs.changed == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "🚨 ACTION REQUIRED: Utah Index Updated"
          body: "The MD5 hash for the Utah Index of Changes has changed. A new Excel file is likely available."
          to: your-email@example.com
          from: Utah Rules Monitor

      - name: Send Weekly Heartbeat Email
        # Trigger if it's Monday (day 1) AND no change was detected (to avoid double emails)
        if: steps.check.outputs.day == '3' && steps.check.outputs.changed != 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "✅ Weekly Heartbeat: Utah Monitor Active"
          body: "This is your weekly confirmation that the Utah Rules Monitor is online. No changes were detected this week."
          to: your-email@example.com
          from: Utah Rules Monitor
